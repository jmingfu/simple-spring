#rabbitmq配置
  rabbitmq:
    host: 192.168.137.250
    port: 5672
    username: admin
    password: 123456
    virtual-host: /
    connection-timeout: 10000
    listener:
      simple:
        acknowledge-mode: auto # 自动应答
        auto-startup: true
        default-requeue-rejected: false # 不重回队列
        concurrency: 5
        max-concurrency: 20
        prefetch: 1 # 每次只处理一个信息
        retry:
          enabled: false
    template:
      exchange: web.demo
      routing-key: user.key

#MyBatis配置
mybatis:
  mapper-locations: classpath:mapper/*Mapper.xml

#管理员默认密码
admin:
  password: 123456

# mybatis-plus 配置（比mybatis简单）
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true # 下划线转驼峰
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 打印sql
  type-aliases-package: com.xxx.entity # 实体类包
  global-config:
    db-config:
      logic-delete-field: isDeleted #实体类字段名
      logic-delete-value: 1 #已删除
      logic-not-delete-value: 0 #未删除

