spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    username: root
    password: jmfjmf55
    driver-class-name: net.sf.log4jdbc.sql.jdbcapi.DriverSpy
    url: jdbc:log4jdbc:mysql://192.168.137.250:3306/spring_demo_database?serverTimezone=UTC&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true
  web:
    resources:
      static-locations: classpath:/static/  # 静态资源目录（默认就是这个，可省略）
    mvc:
      welcome-page:
        enabled: true  # 开启默认首页
      static-path-pattern: /**  # 静态资源匹配规则（确保能访问到static下的所有文件）
  jpa:
    hibernate:
      ddl-auto: none # 禁用JPA自动建表（我们手动建表了，避免冲突）
      show-sql: true # 开启SQL日志，方便排查生成的SQL
