<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>管理员注册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-box {
            background: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
        }
        .login-box h1 {
            font-size: 36px;
            color: #1d2129;
            margin-bottom: 30px;
            text-align: left;
            font-weight: 500;
        }
        .form-item {
            margin-bottom: 20px;
        }
        .form-item label {
            display: block;
            margin-bottom: 8px;
            color: #4e5969;
            font-size: 14px;
        }
        .form-item input {
            width: 100%;
            height: 50px;
            padding: 0 15px;
            border: 1px solid #d0d3d9;
            border-radius: 6px;
            font-size: 16px;
            transition: all 0.3s;
        }
        .form-item input:focus {
            border-color: #0078ff;
            box-shadow: 0 0 0 3px rgba(0, 120, 255, 0.1);
            outline: none;
        }
        .submit-btn {
            width: 100%;
            height: 50px;
            background-color: #0078ff;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .submit-btn:hover {
            background-color: #0066cc;
        }
    </style>
</head>
<body>
<div class="login-box">
    <h1>管理员注册</h1>
    <form action="/admin/register" method="post">
        <div class="form-item">
            <label>用户名</label>
            <input type="text" name="userName" placeholder="请输入用户名" required>
        </div>
        <div class="form-item">
            <label>密码</label>
            <input type="password" name="userPassword" placeholder="请输入密码">
        </div>
        <button type="submit" class="submit-btn">注册</button>
    </form>
</div>
</body>
</html>
