<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple-Spring 接口总览</title>
    <!-- 引入Element UI和axios（CDN方式） -->
    <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
    <script src="https://unpkg.com/vue@2/dist/vue.js"></script>
    <script src="https://unpkg.com/element-ui/lib/index.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container {
            width: 90%;
            max-width: 1200px;
            margin: 30px auto;
        }
        .el-card {
            margin-bottom: 20px;
        }
        .menu-item {
            display: inline-block;
            margin: 0 10px;
            padding: 10px 20px;
            background: #409EFF;
            color: white;
            border-radius: 4px;
            text-decoration: none;
        }
        .menu-item:hover {
            background: #66b1ff;
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <el-card>
        <div slot="header" class="clearfix">
            <span>Simple-Spring 接口管理</span>
        </div>
        <div class="menu">
            <a href="user-list.html" class="menu-item">用户管理</a>
            <a href="javascript:;" class="menu-item" @click="testHello">测试Hello接口</a>
        </div>
    </el-card>
</div>

<script src="js/api.js"></script>
<script>
    new Vue({
        el: '#app',
        methods: {
            async testHello() {
                try {
                    const res = await api.test.hello();
                    this.$message.success("接口调用成功：" + JSON.stringify(res));
                } catch (err) {
                    this.$message.error("接口调用失败");
                }
            }
        }
    });
</script>
</body>
</html>
