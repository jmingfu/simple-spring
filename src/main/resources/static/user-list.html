<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
    <script src="https://unpkg.com/vue@2/dist/vue.js"></script>
    <script src="https://unpkg.com/element-ui/lib/index.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        .container {
            width: 95%;
            margin: 20px auto;
        }
        .search-bar {
            margin-bottom: 20px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 4px;
        }
        .operate-btn {
            margin-right: 5px;
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <!-- 搜索栏（仅用户名搜索） -->
    <div class="search-bar">
        <el-input v-model="searchParams.name" placeholder="请输入用户名" style="width: 200px; margin-right: 10px;"></el-input>
        <el-button type="primary" @click="getUserList">查询</el-button>
        <el-button @click="resetSearch">重置</el-button>
        <el-button type="success" @click="toAddUser" style="float: right;">新增用户</el-button>
    </div>

    <!-- 用户表格（仅ID、用户名、邮箱、创建时间、操作） -->
    <el-table :data="userList" border stripe style="width: 100%" @selection-change="handleSelectionChange">
        <el-table-column type="selection" width="55"></el-table-column>
        <el-table-column prop="id" label="ID" width="80"></el-table-column>
        <el-table-column prop="name" label="用户名" min-width="150"></el-table-column>
        <el-table-column prop="email" label="邮箱" min-width="200"></el-table-column>
        <el-table-column prop="createTime" label="创建时间" min-width="180"></el-table-column>
        <el-table-column label="操作" width="150">
            <template slot-scope="scope">
                <el-button size="mini" type="primary" class="operate-btn" @click="toEditUser(scope.row)">编辑</el-button>
                <el-button size="mini" type="danger" class="operate-btn" @click="delUser(scope.row.id)">删除</el-button>
            </template>
        </el-table-column>
    </el-table>

    <!-- 分页 -->
    <el-pagination
            @size-change="handleSizeChange"
            @current-change="handleCurrentChange"
            :current-page="pageParams.pageNum"
            :page-sizes="[10, 20, 50, 100]"
            :page-size="pageParams.pageSize"
            layout="total, sizes, prev, pager, next, jumper"
            :total="total">
    </el-pagination>

    <!-- 批量删除按钮 -->
    <el-button type="danger" @click="batchDelUser" style="margin-top: 10px;" :disabled="selectedIds.length === 0">批量删除</el-button>
</div>

<script src="js/api.js"></script>
<script>
    new Vue({
        el: '#app',
        data() {
            return {
                // 搜索参数（仅用户名）
                searchParams: {
                    name: ''
                },
                // 分页参数
                pageParams: {
                    pageNum: 1,
                    pageSize: 10
                },
                // 用户列表
                userList: [],
                //分页结果
                records:[],
                // 总条数
                total: 0,
                // 选中的ID
                selectedIds: []
            }
        },
        mounted() {
            this.getUserList();
        },
        methods: {
            // 获取用户列表
            async getUserList() {
                try {
                    const params = { ...this.searchParams, ...this.pageParams };
                    const res = await api.user.list(params);
                    console.log("接口返回：", res);
                    this.userList = res.data.records || [];
                    this.total = res.data.total || 0;
                    console.log("处理后数据：", this.userList, this.total);
                } catch (err) {
                    this.$message.error(err.data.msg);
                }
            },
            // 重置搜索
            resetSearch() {
                this.searchParams = { name: '' };
                this.pageParams = { pageNum: 1, pageSize: 10 };
                this.getUserList();
            },
            // 分页大小改变
            handleSizeChange(val) {
                this.pageParams.pageSize = val;
                this.getUserList();
            },
            // 当前页改变
            handleCurrentChange(val) {
                this.pageParams.pageNum = val;
                this.getUserList();
            },
            // 跳转到新增页面
            toAddUser() {
                window.location.href = 'user-add.html';
            },
            // 跳转到编辑页面
            toEditUser(row) {
                window.location.href = `user-edit.html?id=${row.id}`;
            },
            // 删除单个用户
            async delUser(id) {
                try {
                    await this.$confirm('此操作将永久删除该用户, 是否继续?', '提示', {
                        confirmButtonText: '确定',
                        cancelButtonText: '取消',
                        type: 'warning'
                    });
                    await api.user.del(id);
                    this.$message.success('删除成功!');
                    this.getUserList();
                } catch (err) {
                    this.$message.info('已取消删除');
                }
            },
            // 批量删除
            async batchDelUser() {
                try {
                    await this.$confirm('此操作将永久删除选中的用户, 是否继续?', '提示', {
                        type: 'warning'
                    });
                    await api.user.batchDel(this.selectedIds);
                    this.$message.success('批量删除成功!');
                    this.getUserList();
                } catch (err) {
                    this.$message.info('已取消删除');
                }
            },
            // 选择行改变
            handleSelectionChange(val) {
                this.selectedIds = val.map(item => item.id);
            }
        }
    });
</script>
</body>
</html>
