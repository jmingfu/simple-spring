<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>登录</title>
  <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
  <style>
    /* 只加了按钮间距样式，其余完全不动 */
    .btn-box {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }
    .btn-box .el-button {
      flex: 1;
    }
  </style>
</head>
<body>
<div id="app" style="width:400px;margin:100px auto;">
  <el-card>
    <div slot="header"><span>用户登录</span></div>
    <el-form label-width="80px">
      <el-form-item label="用户名">
        <el-input v-model="loginForm.userName"></el-input>
      </el-form-item>
      <el-form-item label="密码">
        <el-input v-model="loginForm.userPassword" type="password"></el-input>
      </el-form-item>

      <!-- 登录 + 注册 按钮并排 -->
      <div class="btn-box">
        <el-button type="primary" @click="login">登录</el-button>
        <el-button @click="goRegister">注册账号</el-button>
      </div>
    </el-form>
  </el-card>
</div>

<script src="https://unpkg.com/vue@2/dist/vue.js"></script>
<script src="https://unpkg.com/element-ui/lib/index.js"></script>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>
<script src="js/api.js"></script>

<script>
  new Vue({
    el: '#app',
    data() {
      return {
        loginForm: { userName: '', userPassword: '' }
      }
    },
    methods: {
      async login() {
        try {
          const res = await api.user.login(this.loginForm);
          if (res.code === 'Success') {
            // 先弹出成功提示
            this.$message.success('登录成功'+ JSON.stringify(res));
            // 存储token
            localStorage.setItem('token', res.data.token);
            // 延迟 1.2 秒再跳转（足够看到弹窗）
            setTimeout(() => {
              window.location.href = 'index.html';
            }, 1200);
          } else {
            this.$message.error(res.msg);
          }
        } catch (err) {
          this.$message.error('登录失败');
          console.error(err); // 方便调试，建议保留
        }
      },
      // 新增：跳转到注册页
      goRegister() {
        window.location.href = 'register.html';
      }
    }
  })
</script>
</body>
</html>
